<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chess Puzzles — Lichess Tactics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070C0D;--surface:#0C1415;--card:#0F1A1B;--border:#1A2B2C;
  --sq-light:#1E3133;--sq-dark:#0D1A1B;
  --accent:#5BBFCA;--accent2:#3D8F99;--accent-dim:#254F55;
  --text:#C8DDE0;--muted:#445F63;
  --sel:rgba(91,191,202,.45);--hint:rgba(91,191,202,.65);--lastmv:rgba(91,191,202,.18);
  --ok:#2E7A54;--err:#7A2E2E;
}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);
  font-family:'EB Garamond',Georgia,serif;
  min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 120% 80% at 50% -10%,#132C2F33 0%,transparent 70%);
}
header{
  border-bottom:1px solid var(--border);
  padding:1.8rem 2.5rem 1.4rem;
  display:flex;align-items:flex-end;gap:1.5rem;
  background:linear-gradient(180deg,#0A171855 0%,transparent 100%);
}
.site-title{
  font-family:'Cinzel',Georgia,serif;font-weight:900;font-size:2rem;
  letter-spacing:.12em;line-height:1;
  background:linear-gradient(135deg,#B0D8DE 0%,#5BBFCA 40%,#3D8F99 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.site-sub{font-style:italic;font-size:.9rem;color:var(--muted);margin-bottom:.05rem}
.header-right{margin-left:auto;display:flex;align-items:center;gap:.9rem}
.renew-btn{
  padding:.5rem 1.3rem;background:transparent;border:1px solid var(--accent2);
  color:var(--accent);font-family:'Cinzel',serif;font-size:.68rem;
  letter-spacing:.15em;text-transform:uppercase;cursor:pointer;
  transition:all .22s;display:flex;align-items:center;gap:.5rem;
}
.renew-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.renew-btn svg{transition:transform .5s}
.renew-btn:hover svg{transform:rotate(360deg)}
.tabs{
  display:flex;border-bottom:1px solid var(--border);padding:0 2.5rem;
  background:linear-gradient(180deg,#0A17180A 0%,transparent 100%);
}
.tab-btn{
  padding:.9rem 1.8rem;background:transparent;border:none;
  border-bottom:2px solid transparent;color:var(--muted);
  font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.14em;
  text-transform:uppercase;cursor:pointer;transition:color .2s,border-color .2s;
  margin-bottom:-1px;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-sub{
  display:block;font-family:'EB Garamond',serif;font-style:italic;
  font-size:.78rem;text-transform:none;letter-spacing:0;
  color:var(--muted);font-weight:400;margin-top:.1rem;
}
main{padding:2rem 2.5rem}
.puzzle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.4rem}
.puzzle-card{
  background:var(--card);border:1px solid var(--border);
  cursor:pointer;transition:border-color .2s,transform .15s,box-shadow .2s;overflow:hidden;
}
.puzzle-card:hover{
  border-color:var(--accent2);transform:translateY(-3px);
  box-shadow:0 8px 28px rgba(0,0,0,.7),0 0 0 1px var(--accent-dim);
}
.puzzle-card.is-solved{border-color:var(--ok);opacity:.7}
.card-canvas-wrap{width:100%;aspect-ratio:1;background:var(--sq-dark)}
.card-canvas-wrap canvas{display:block;width:100%;height:100%;image-rendering:auto}
.card-meta{padding:.8rem 1rem;border-top:1px solid var(--border)}
.card-id{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.card-rating{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:var(--accent);margin:.18rem 0}
.card-themes{font-size:.78rem;color:var(--muted);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.solved-badge{
  display:inline-block;font-family:'Cinzel',serif;font-size:.58rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--ok);
  border:1px solid var(--ok);padding:.1rem .4rem;margin-top:.3rem;
}
.plist.hidden,.puzzle-view.hidden{display:none!important}
.pv-header{display:flex;align-items:center;gap:1.2rem;margin-bottom:1.6rem;flex-wrap:wrap}
.back-btn{
  padding:.45rem 1.1rem;background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:'Cinzel',serif;font-size:.65rem;
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;flex-shrink:0;
}
.back-btn:hover{border-color:var(--muted);color:var(--text)}
.pv-title{font-family:'Cinzel',serif;font-weight:700;font-size:1.1rem}
.pv-rating{margin-left:auto;font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--accent)}
.pv-body{display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap}
.board-outer{flex:0 0 auto}
.board-files{display:flex;padding:0 24px;margin-bottom:3px}
.board-file{width:64px;text-align:center;font-family:'Cinzel',serif;font-size:.6rem;color:var(--muted)}
.board-row{display:flex;align-items:center}
.board-rank{width:20px;font-family:'Cinzel',serif;font-size:.6rem;color:var(--muted);text-align:center;flex-shrink:0}
#chess-board{
  display:grid;grid-template-columns:repeat(8,64px);grid-template-rows:repeat(8,64px);
  border:1px solid var(--accent-dim);
  box-shadow:0 0 0 4px var(--bg),0 0 0 5px var(--border),0 16px 56px rgba(0,0,0,.95),inset 0 0 60px rgba(91,191,202,.03);
  cursor:default;user-select:none;
}
.sq{width:64px;height:64px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;font-size:42px;line-height:1}
.sq.light{background:var(--sq-light)}.sq.dark{background:var(--sq-dark)}
.sq.sel{background:var(--sel)!important}.sq.lm{background:var(--lastmv)!important}
.sq.chk{background:rgba(140,30,30,.5)!important}
.sq.hint-e::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:var(--hint);pointer-events:none;box-shadow:0 0 8px var(--hint)}
.sq.hint-c::before{content:'';position:absolute;inset:4px;border:3px solid var(--hint);pointer-events:none;z-index:1}
.piece{position:relative;z-index:2;pointer-events:none;line-height:1}
.pw{color:#E8F4F6;text-shadow:-2px -2px 0 #061214,2px -2px 0 #061214,-2px 2px 0 #061214,2px 2px 0 #061214,0 0 8px rgba(91,191,202,.35);filter:drop-shadow(0 2px 3px rgba(0,0,0,.8))}
.pb{color:#2A3F47;text-shadow:-1.5px -1.5px 0 rgba(91,191,202,.5),1.5px -1.5px 0 rgba(91,191,202,.5),-1.5px 1.5px 0 rgba(91,191,202,.5),1.5px 1.5px 0 rgba(91,191,202,.5);filter:drop-shadow(0 2px 4px rgba(0,0,0,.9))}
.side-panel{flex:1;min-width:230px;max-width:340px;display:flex;flex-direction:column;gap:1rem}
.panel-block{background:var(--card);border:1px solid var(--border);padding:1rem 1.15rem}
.panel-lbl{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem}
.color-row{display:flex;align-items:center;gap:.6rem;font-family:'Cinzel',serif;font-size:.85rem}
.cdot{width:17px;height:17px;border-radius:50%;flex-shrink:0}
.cdot.w{background:radial-gradient(circle at 35% 35%,#EEF6F8,#B0CFD3);border:2px solid #2A3F47;box-shadow:0 0 6px rgba(91,191,202,.3)}
.cdot.b{background:radial-gradient(circle at 35% 35%,#3A5560,#1A2E34);border:2px solid rgba(91,191,202,.4)}
.status-box{padding:1.1rem 1.15rem;border:1px solid var(--border);min-height:85px;transition:border-color .3s,background .3s}
.status-box.ok{border-color:var(--ok);background:rgba(46,122,84,.1)}.status-box.err{border-color:var(--err);background:rgba(122,46,46,.1)}
.s-icon{font-size:1.4rem;margin-bottom:.25rem}.s-msg{font-family:'Cinzel',serif;font-size:.9rem;font-weight:700}
.s-sub{font-size:.82rem;color:var(--muted);font-style:italic;margin-top:.2rem}
.themes-val{font-style:italic;color:var(--accent);font-size:.88rem;line-height:1.5}
.nav-row{display:flex;gap:.45rem;margin-top:.2rem;flex-wrap:wrap}
.ndot{width:11px;height:11px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;padding:0}
.ndot:hover{border-color:var(--accent2)}.ndot.cur{background:var(--accent);border-color:var(--accent)}.ndot.slv{background:var(--ok);border-color:var(--ok)}
.btn{padding:.6rem 1.2rem;background:transparent;border:1px solid var(--accent2);color:var(--accent);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%}
.btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.btn:disabled{opacity:.35;cursor:not-allowed}.btn:disabled:hover{background:transparent;color:var(--accent)}
.btn-g{border-color:var(--border);color:var(--muted)}.btn-g:hover{background:var(--card);color:var(--text);border-color:var(--muted)}
.lichess-a{font-size:.78rem;color:var(--muted);font-style:italic;text-decoration:none;display:inline-block;margin-top:.2rem}
.lichess-a:hover{color:var(--accent)}
footer{border-top:1px solid var(--border);padding:1.3rem 2.5rem;display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.78rem;font-style:italic;margin-top:3rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .28s ease both}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .3s ease}
@keyframes flashGreen{
  0%  {box-shadow:0 0 0 4px var(--bg),0 0 0 6px #3CB97A,0 0 28px rgba(60,185,122,.6),0 16px 56px rgba(0,0,0,.95)}
  60% {box-shadow:0 0 0 4px var(--bg),0 0 0 5px #3CB97A,0 0 14px rgba(60,185,122,.3),0 16px 56px rgba(0,0,0,.95)}
  100%{box-shadow:0 0 0 4px var(--bg),0 0 0 5px var(--border),0 16px 56px rgba(0,0,0,.95)}
}
.board-correct{animation:flashGreen .65s ease forwards}
@keyframes flashRed{
  0%  {box-shadow:0 0 0 4px var(--bg),0 0 0 6px #C23B3B,0 0 28px rgba(194,59,59,.6),0 16px 56px rgba(0,0,0,.95)}
  60% {box-shadow:0 0 0 4px var(--bg),0 0 0 5px #C23B3B,0 0 14px rgba(194,59,59,.3),0 16px 56px rgba(0,0,0,.95)}
  100%{box-shadow:0 0 0 4px var(--bg),0 0 0 5px var(--border),0 16px 56px rgba(0,0,0,.95)}
}
.board-wrong{animation:flashRed .65s ease forwards}
.board-win{
  box-shadow:0 0 0 4px var(--bg),0 0 0 5px #3CB97A,0 0 22px rgba(60,185,122,.45),0 16px 56px rgba(0,0,0,.95)!important;
  border-color:#3CB97A!important;
  animation:none!important;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .6s ease}
@keyframes cardFadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.card-new{animation:cardFadeIn .3s ease both}

/* ── light theme ─────────────────────────────────── */
[data-theme="light"]{
  --bg:#F2EDE4;--surface:#EAE3D6;--card:#E3DBCC;--border:#C5B99A;
  --sq-light:#F0D9B5;--sq-dark:#B58863;
  --accent:#6B4226;--accent2:#8B5E3C;--accent-dim:#C9A87A;
  --text:#1A1008;--muted:#7A6040;
  --sel:rgba(107,66,38,.35);--hint:rgba(107,66,38,.6);--lastmv:rgba(107,66,38,.2);
  --ok:#2A6B3A;--err:#8B2A2A;
}
[data-theme="light"] body{
  background-image:radial-gradient(ellipse 120% 80% at 50% -10%,#C9A87A22 0%,transparent 70%);
}
[data-theme="light"] .site-title{
  background:linear-gradient(135deg,#8B5E3C 0%,#6B4226 50%,#4A2E18 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
[data-theme="light"] .pw{
  color:#F8F4EE;
  text-shadow:-2px -2px 0 #3A2010,2px -2px 0 #3A2010,-2px 2px 0 #3A2010,2px 2px 0 #3A2010,0 0 6px rgba(0,0,0,.3);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));
}
[data-theme="light"] .pb{
  color:#1A0E06;
  text-shadow:-1.5px -1.5px 0 rgba(240,217,181,.8),1.5px -1.5px 0 rgba(240,217,181,.8),-1.5px 1.5px 0 rgba(240,217,181,.8),1.5px 1.5px 0 rgba(240,217,181,.8);
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
}
[data-theme="light"] .cdot.w{background:radial-gradient(circle at 35% 35%,#F8F4EE,#D4C4A8);border:2px solid #5A3A20;box-shadow:0 0 4px rgba(107,66,38,.2)}
[data-theme="light"] .cdot.b{background:radial-gradient(circle at 35% 35%,#4A3020,#1A0E06);border:2px solid rgba(107,66,38,.5)}
[data-theme="light"] #chess-board{
  box-shadow:0 0 0 4px var(--bg),0 0 0 5px var(--border),0 16px 56px rgba(0,0,0,.3),inset 0 0 40px rgba(107,66,38,.04);
}
[data-theme="light"] .card-canvas-wrap{background:var(--sq-light)}

/* ── theme toggle button ─────────────────────────── */
.theme-btn{
  width:36px;height:36px;
  background:transparent;border:1px solid var(--accent2);
  color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s;flex-shrink:0;
  border-radius:2px;
}
.theme-btn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.theme-btn svg{display:block;transition:transform .4s,opacity .2s}
</style>
</head>
<body>

<header>
  <div>
    <div class="site-title">Chess Puzzles</div>
    <div class="site-sub">Lichess Open Puzzle Database</div>
  </div>
  <div class="header-right">
    <button class="renew-btn" onclick="renewPuzzles()" title="Load new random puzzles from the pool">
      <svg id="renew-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
      Renew Puzzles
    </button>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark theme">
      <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- sun rays (visible in dark mode) -->
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2"  x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2"  y1="12" x2="5"  y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
        <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
        <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
        <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="easy"   onclick="switchTab('easy')">
    Easy<span class="tab-sub">800 – 1,000 ★</span>
  </button>
  <button class="tab-btn" data-tab="medium" onclick="switchTab('medium')">
    Medium<span class="tab-sub">1,500 – 1,800 ★</span>
  </button>
  <button class="tab-btn" data-tab="hard"   onclick="switchTab('hard')">
    Hard<span class="tab-sub">2,200 + ★</span>
  </button>
</div>

<main>
  <div id="list-easy"   class="plist"><div class="puzzle-grid" id="grid-easy"></div></div>
  <div id="list-medium" class="plist hidden"><div class="puzzle-grid" id="grid-medium"></div></div>
  <div id="list-hard"   class="plist hidden"><div class="puzzle-grid" id="grid-hard"></div></div>

  <div id="puzzle-view" class="puzzle-view hidden">
    <div class="pv-header">
      <button class="back-btn" onclick="closePuzzle()">← Back</button>
      <div class="pv-title" id="pv-title">Puzzle</div>
      <div class="pv-rating" id="pv-rating"></div>
    </div>
    <div class="pv-body">
      <div class="board-outer">
        <div class="board-files" id="bf-top"></div>
        <div class="board-row">
          <div class="board-rank" id="br-left"
               style="display:flex;flex-direction:column;height:512px;justify-content:space-around"></div>
          <div id="chess-board"></div>
          <div class="board-rank" id="br-right"
               style="display:flex;flex-direction:column;height:512px;justify-content:space-around;text-align:right"></div>
        </div>
        <div class="board-files" id="bf-bot"></div>
      </div>
      <div class="side-panel">
        <div class="panel-block">
          <div class="panel-lbl">You Play</div>
          <div class="color-row">
            <div class="cdot" id="cdot"></div>
            <span id="clabel"></span>
          </div>
        </div>
        <div class="status-box" id="sbox">
          <div class="s-icon" id="si">♟</div>
          <div class="s-msg"  id="sm">Find the best move</div>
          <div class="s-sub"  id="ss">Click a piece to select it</div>
        </div>
        <div class="panel-block">
          <div class="panel-lbl">Puzzle Navigation</div>
          <div class="nav-row" id="nav-dots"></div>
        </div>
        <button class="btn btn-g" id="btn-hint"  onclick="doHint()">Hint — show piece to move</button>
        <button class="btn btn-g" id="btn-retry" onclick="doRetry()" style="display:none">↺  Retry Puzzle</button>
        <button class="btn"       id="btn-next"  onclick="doNext()"  style="display:none">Next Puzzle →</button>
        <a class="lichess-a" id="lichess-a" href="#" target="_blank">View original game on Lichess ↗</a>
      </div>
    </div>
  </div>
</main>

<footer>
  <span>Chess Puzzles Trainer</span>
  <span>Puzzles sourced from the Lichess open database — lichess.org/training</span>

const SHOW_SIZE=5;

function toggleTheme(){
  const html=document.documentElement;
  const isLight=html.getAttribute('data-theme')==='light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  const icon=document.getElementById('theme-icon');
  if(isLight){
    // switching to dark — show sun
    icon.innerHTML=`<circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2"  x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2"  y1="12" x2="5"  y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
      <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
      <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
      <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>`;
  } else {
    // switching to light — show moon
    icon.innerHTML=`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
  }
  // rebuild mini canvases so square colors update
  buildAllCards();
}
const SYM={w:{k:'♔',q:'♕',r:'♖',b:'♗',n:'♘',p:'♙'},b:{k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'}};
let curDiff='easy',curIdx=0,solvedMap={},ACTIVE={};
let G={chess:null,puzzle:null,midx:0,sel:null,hints:[],lf:null,lt:null,done:false};

window.addEventListener('DOMContentLoaded',()=>{pickActive();buildAllCards();switchTab('easy');});

function pickActive(){
  solvedMap={};ACTIVE={};
  ['easy','medium','hard'].forEach(d=>{
    const pool=POOL[d]||[];
    const shuffled=[...pool].sort(()=>Math.random()-.5);
    ACTIVE[d]=shuffled.slice(0,SHOW_SIZE);
  });
}

function renewPuzzles(){
  document.getElementById('puzzle-view').classList.add('hidden');
  ['easy','medium','hard'].forEach(k=>document.getElementById('list-'+k).classList.remove('hidden'));
  const icon=document.getElementById('renew-icon');
  icon.classList.add('spinning');
  setTimeout(()=>icon.classList.remove('spinning'),650);
  pickActive();buildAllCards(true);switchTab(curDiff);
}

function switchTab(d){
  curDiff=d;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===d));
  ['easy','medium','hard'].forEach(k=>{
    document.getElementById('list-'+k).classList.toggle('hidden',k!==d);
  });
  document.getElementById('puzzle-view').classList.add('hidden');
}

function buildAllCards(animate=false){
  ['easy','medium','hard'].forEach(d=>{
    const grid=document.getElementById('grid-'+d);
    grid.innerHTML='';
    (ACTIVE[d]||[]).forEach((p,i)=>grid.appendChild(makeCard(p,d,i,animate)));
  });
}

function makeCard(p,d,i,animate=false){
  const card=document.createElement('div');
  card.className='puzzle-card '+(animate?'card-new':'anim');
  if(animate)card.style.animationDelay=(i*.07)+'s';
  if(solvedMap[d+'-'+i])card.classList.add('is-solved');
  const wrap=document.createElement('div');wrap.className='card-canvas-wrap';
  const cv=document.createElement('canvas');cv.width=320;cv.height=320;
  wrap.appendChild(cv);card.appendChild(wrap);drawMini(cv,p);
  const meta=document.createElement('div');meta.className='card-meta';
  meta.innerHTML=`<div class="card-id">Puzzle #${p.id}</div><div class="card-rating">${p.rating} ★</div><div class="card-themes">${fmtThemes(p.themes)}</div>${solvedMap[d+'-'+i]?'<div class="solved-badge">✓ Solved</div>':''}`;
  card.appendChild(meta);card.onclick=()=>openPuzzle(d,i);return card;
}

function drawMini(cv,p){
  const ctx=cv.getContext('2d');
  const SIZE=cv.width;const SQ=SIZE/8;

  // Read square colors from current theme via CSS variables
  const isLight=document.documentElement.getAttribute('data-theme')==='light';
  const LC = isLight ? '#F0D9B5' : '#1E3133';
  const DC = isLight ? '#B58863' : '#0D1A1B';

  // Piece colors per theme
  const wFill   = isLight ? '#F8F4EE' : '#E8F4F6';
  const wShadow = isLight ? '#3A2010' : '#061214';
  const wStroke = isLight ? '#3A2010' : '#061214';
  const bFill   = isLight ? '#1A0E06' : '#2A3F47';
  const bGlow   = isLight ? 'rgba(240,217,181,.85)' : 'rgba(91,191,202,.6)';

  const ch=new Chess(p.fen);ch.move(uciObj(p.moves[0]));
  const board=ch.board();const flipped=p.player==='b';

  for(let r=0;r<8;r++){for(let c=0;c<8;c++){
    const br=flipped?7-r:r,bc=flipped?7-c:c;
    const light=(br+bc)%2===1;
    ctx.fillStyle=light?LC:DC;
    ctx.fillRect(c*SQ,r*SQ,SQ,SQ);
    const pc=board[br][bc];if(!pc)continue;
    const sym=SYM[pc.color][pc.type];
    const fontSize=SQ*0.82;
    ctx.font=`${fontSize}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const x=c*SQ+SQ/2, y=r*SQ+SQ/2+SQ*0.04;
    if(pc.color==='w'){
      ctx.fillStyle=wFill;
      ctx.shadowColor=wShadow;ctx.shadowBlur=SQ*0.18;
      ctx.fillText(sym,x,y);
      ctx.shadowBlur=0;
      ctx.strokeStyle=wStroke;ctx.lineWidth=SQ*0.045;
      ctx.strokeText(sym,x,y);
    }else{
      ctx.fillStyle=bFill;
      ctx.shadowColor=bGlow;ctx.shadowBlur=SQ*0.15;
      ctx.fillText(sym,x,y);
      ctx.shadowBlur=0;
    }
  }}
}

function openPuzzle(d,i){
  curDiff=d;curIdx=i;const p=ACTIVE[d][i];
  ['easy','medium','hard'].forEach(k=>document.getElementById('list-'+k).classList.add('hidden'));
  document.getElementById('puzzle-view').classList.remove('hidden');
  document.getElementById('pv-title').textContent=`Puzzle #${p.id}`;
  document.getElementById('pv-rating').textContent=`${p.rating} ★`;
  const la=document.getElementById('lichess-a');
  if(p.url){la.href=p.url;la.style.display='';}else{la.style.display='none';}
  document.getElementById('cdot').className='cdot '+(p.player==='w'?'w':'b');
  document.getElementById('clabel').textContent=p.player==='w'?'White':'Black';
  buildNavDots(d);initGame(p);
}

function closePuzzle(){
  document.getElementById('puzzle-view').classList.add('hidden');
  document.getElementById('list-'+curDiff).classList.remove('hidden');
  buildAllCards();
}

function initGame(p){
  const ch=new Chess(p.fen);ch.move(uciObj(p.moves[0]));
  G={chess:ch,puzzle:p,midx:1,sel:null,hints:[],lf:p.moves[0].slice(0,2),lt:p.moves[0].slice(2,4),done:false,hintStage:0};
  setStatus('','♟','Find the best move','Click a piece to select it');
  document.getElementById('btn-hint').textContent='Hint — show piece to move';
  document.getElementById('btn-hint').style.display='';
  document.getElementById('btn-retry').style.display='none';
  document.getElementById('btn-next').style.display='none';
  renderBoard();renderCoords();
}

function renderBoard(){
  const el=document.getElementById('chess-board');el.innerHTML='';if(!G.chess)return;
  const board=G.chess.board();const flipped=G.puzzle.player==='b';const turn=G.chess.turn();
  let ckSq=null;
  if(G.chess.in_check()){for(let r=0;r<8;r++)for(let c=0;c<8;c++){const pc=board[r][c];if(pc&&pc.type==='k'&&pc.color===turn)ckSq=sq(r,c);}}
  for(let row=0;row<8;row++){for(let col=0;col<8;col++){
    const br=flipped?7-row:row,bc=flipped?7-col:col;
    const pc=board[br][bc];const s=sq(br,bc);const light=(br+bc)%2===1;
    const div=document.createElement('div');
    div.className='sq '+(light?'light':'dark');
    if(s===G.sel)div.classList.add('sel');
    else if(s===G.lf||s===G.lt)div.classList.add('lm');
    if(s===ckSq)div.classList.add('chk');
    if(G.hints.includes(s))div.classList.add(pc?'hint-c':'hint-e');
    if(pc){const sp=document.createElement('span');sp.className='piece p'+pc.color;sp.textContent=SYM[pc.color][pc.type];div.appendChild(sp);}
    div.addEventListener('click',()=>handleClick(s));el.appendChild(div);
  }}
}

function renderCoords(){
  const flipped=G.puzzle.player==='b';
  const files=flipped?'hgfedcba':'abcdefgh';
  const ranks=flipped?'12345678':'87654321';
  function fileRow(id){const el=document.getElementById(id);el.innerHTML='<div style="width:20px"></div>';for(const f of files){const d=document.createElement('div');d.className='board-file';d.textContent=f;el.appendChild(d);}el.innerHTML+='<div style="width:20px"></div>';}
  fileRow('bf-top');fileRow('bf-bot');
  function rankCol(id){const el=document.getElementById(id);el.innerHTML='';for(const r of ranks){const d=document.createElement('div');d.className='board-rank';d.textContent=r;el.appendChild(d);}}
  rankCol('br-left');rankCol('br-right');
}

function handleClick(s){
  if(G.done)return;if(G.chess.turn()!==G.puzzle.player)return;
  const pc=G.chess.get(s);
  if(G.sel){
    if(s===G.sel){deselect();return;}
    if(pc&&pc.color===G.puzzle.player){selectSq(s);return;}
    tryMove(G.sel,s);
  }else{if(pc&&pc.color===G.puzzle.player)selectSq(s);}
}
function selectSq(s){G.sel=s;G.hints=G.chess.moves({square:s,verbose:true}).map(m=>m.to);renderBoard();}
function deselect(){G.sel=null;G.hints=[];renderBoard();}

function flashBoard(cls){
  const bd=document.getElementById('chess-board');
  bd.classList.remove('board-correct','board-wrong','board-win');
  void bd.offsetWidth;
  bd.classList.add(cls);
}
function tryMove(from,to){
  const exp=G.puzzle.moves[G.midx];
  const ef=exp.slice(0,2),et=exp.slice(2,4),ep=exp.length>4?exp[4]:undefined;
  G.sel=null;G.hints=[];G.hintStage=0;
  document.getElementById('btn-hint').textContent='Hint — show piece to move';
  if(from===ef&&to===et){
    const mo={from,to};if(ep)mo.promotion=ep;
    G.chess.move(mo);G.midx++;G.lf=from;G.lt=to;
    flashBoard('board-correct');
    renderBoard();
    if(G.midx>=G.puzzle.moves.length){onSolved();return;}
    setStatus('','⏳','Correct!','The opponent responds…');
    setTimeout(()=>{
      const re=G.puzzle.moves[G.midx];const rm={from:re.slice(0,2),to:re.slice(2,4)};
      if(re.length>4)rm.promotion=re[4];
      G.chess.move(rm);G.midx++;G.lf=rm.from;G.lt=rm.to;renderBoard();
      if(G.midx>=G.puzzle.moves.length)onSolved();
      else setStatus('','♙','Good move!','Find the next best move');
    },700);
  }else{
    renderBoard();const bd=document.getElementById('chess-board');
    flashBoard('board-wrong');
    bd.classList.add('shake');setTimeout(()=>bd.classList.remove('shake'),350);
    setStatus('err','✗','Incorrect move','That\'s not the best move — try again');
    document.getElementById('btn-retry').style.display='';
    setTimeout(()=>{if(!G.done)setStatus('','♟','Find the best move','Click a piece to select it');},2200);
  }
}

function onSolved(){
  G.done=true;solvedMap[curDiff+'-'+curIdx]=true;
  const bd=document.getElementById('chess-board');
  bd.classList.remove('board-correct','board-wrong');
  void bd.offsetWidth;
  bd.classList.add('board-win');
  setStatus('ok','✓','Puzzle Solved!','Excellent tactical vision');
  document.getElementById('btn-hint').style.display='none';
  document.getElementById('btn-retry').style.display='none';
  if(curIdx<(ACTIVE[curDiff]||[]).length-1)document.getElementById('btn-next').style.display='';
  buildNavDots(curDiff);
}

function doHint(){
  if(G.done)return;
  if(G.chess.turn()!==G.puzzle.player)return; // opponent moving
  if(G.hintStage===0){
    // stage 1: highlight the piece to move
    G.hintStage=1;
    selectSq(G.puzzle.moves[G.midx].slice(0,2));
    setStatus('','💡','Hint — piece shown','Click Hint again to reveal the answer');
    document.getElementById('btn-hint').textContent='Hint — show answer';
  } else {
    // stage 2: execute the correct move automatically
    G.hintStage=0;
    document.getElementById('btn-hint').textContent='Hint — show piece to move';
    const exp=G.puzzle.moves[G.midx];
    const from=exp.slice(0,2),to=exp.slice(2,4);
    const mo={from,to};if(exp.length>4)mo.promotion=exp[4];
    G.chess.move(mo);G.midx++;G.lf=from;G.lt=to;G.sel=null;G.hints=[];
    flashBoard('board-correct');
    renderBoard();
    if(G.midx>=G.puzzle.moves.length){onSolved();return;}
    setStatus('','⏳','Answer shown','The opponent responds…');
    setTimeout(()=>{
      const re=G.puzzle.moves[G.midx];const rm={from:re.slice(0,2),to:re.slice(2,4)};
      if(re.length>4)rm.promotion=re[4];
      G.chess.move(rm);G.midx++;G.lf=rm.from;G.lt=rm.to;renderBoard();
      if(G.midx>=G.puzzle.moves.length)onSolved();
      else{setStatus('','♙','Continue solving','Find the next best move');G.hintStage=0;}
    },700);
  }
}
function doRetry(){initGame(G.puzzle);}
function doNext(){if(curIdx<(ACTIVE[curDiff]||[]).length-1)openPuzzle(curDiff,curIdx+1);}

function setStatus(type,icon,msg,sub){
  const b=document.getElementById('sbox');
  b.className='status-box'+(type==='ok'?' ok':type==='err'?' err':'');
  document.getElementById('si').textContent=icon;document.getElementById('sm').textContent=msg;document.getElementById('ss').textContent=sub;
}

function buildNavDots(d){
  const nav=document.getElementById('nav-dots');nav.innerHTML='';
  (ACTIVE[d]||[]).forEach((_,i)=>{
    const b=document.createElement('button');b.className='ndot';
    if(i===curIdx)b.classList.add('cur');if(solvedMap[d+'-'+i])b.classList.add('slv');
    b.title=`Puzzle ${i+1}`;b.onclick=()=>openPuzzle(d,i);nav.appendChild(b);
  });
}

function uciObj(uci){return{from:uci.slice(0,2),to:uci.slice(2,4),promotion:uci.length>4?uci[4]:undefined};}
function sq(r,c){return 'abcdefgh'[c]+(8-r);}
function fmtThemes(t){if(!t)return'General tactics';return t.split(' ').slice(0,5).map(s=>s.replace(/([A-Z])/g,' $1').trim()).join(' · ');}

</script>
